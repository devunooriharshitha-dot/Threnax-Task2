<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TaskFlow - Task Management App</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0f;
    --surface: #13131a;
    --surface2: #1c1c28;
    --accent: #6c63ff;
    --accent2: #ff6584;
    --accent3: #43e97b;
    --text: #f0f0f8;
    --text2: #8888aa;
    --border: #2a2a3a;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
  }

  /* AUTH SCREEN */
  #auth-screen {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: radial-gradient(ellipse at 20% 50%, #1a1040 0%, var(--bg) 60%),
                radial-gradient(ellipse at 80% 20%, #0d2040 0%, transparent 50%);
  }

  .auth-box {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 24px;
    padding: 48px;
    width: 100%;
    max-width: 420px;
    box-shadow: 0 40px 80px rgba(0,0,0,0.5);
  }

  .auth-logo {
    font-family: 'Syne', sans-serif;
    font-size: 32px;
    font-weight: 800;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    margin-bottom: 8px;
  }

  .auth-subtitle { color: var(--text2); font-size: 14px; margin-bottom: 36px; }

  .auth-tabs { display: flex; gap: 8px; margin-bottom: 28px; }

  .auth-tab {
    flex: 1; padding: 10px; border: 1px solid var(--border);
    background: transparent; color: var(--text2); border-radius: 10px;
    cursor: pointer; font-family: 'DM Sans', sans-serif; font-size: 14px;
    transition: all 0.2s;
  }

  .auth-tab.active {
    background: var(--accent); border-color: var(--accent);
    color: white; font-weight: 500;
  }

  .form-group { margin-bottom: 16px; }

  .form-group label {
    display: block; font-size: 12px; color: var(--text2);
    margin-bottom: 6px; letter-spacing: 0.5px; text-transform: uppercase;
  }

  .form-group input {
    width: 100%; padding: 12px 16px;
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: 10px; color: var(--text);
    font-family: 'DM Sans', sans-serif; font-size: 14px;
    outline: none; transition: border-color 0.2s;
  }

  .form-group input:focus { border-color: var(--accent); }

  .btn-primary {
    width: 100%; padding: 14px;
    background: linear-gradient(135deg, var(--accent), #9c94ff);
    border: none; border-radius: 10px; color: white;
    font-family: 'Syne', sans-serif; font-size: 15px; font-weight: 600;
    cursor: pointer; transition: opacity 0.2s, transform 0.1s;
    margin-top: 8px;
  }

  .btn-primary:hover { opacity: 0.9; transform: translateY(-1px); }
  .btn-primary:active { transform: translateY(0); }

  .auth-error {
    color: var(--accent2); font-size: 13px;
    margin-top: 12px; text-align: center; display: none;
  }

  /* APP SCREEN */
  #app-screen { display: none; min-height: 100vh; }

  .app-header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 16px 32px;
    display: flex; align-items: center; justify-content: space-between;
    position: sticky; top: 0; z-index: 100;
  }

  .app-logo {
    font-family: 'Syne', sans-serif; font-size: 22px; font-weight: 800;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  }

  .header-right { display: flex; align-items: center; gap: 16px; }

  .user-badge {
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: 20px; padding: 6px 14px;
    font-size: 13px; color: var(--text2);
  }

  .user-badge span { color: var(--accent); font-weight: 500; }

  .btn-logout {
    background: transparent; border: 1px solid var(--border);
    color: var(--text2); border-radius: 8px; padding: 6px 14px;
    cursor: pointer; font-size: 13px; font-family: 'DM Sans', sans-serif;
    transition: all 0.2s;
  }

  .btn-logout:hover { border-color: var(--accent2); color: var(--accent2); }

  .app-main { max-width: 1100px; margin: 0 auto; padding: 40px 24px; }

  /* STATS */
  .stats-grid {
    display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
    gap: 16px; margin-bottom: 36px;
  }

  .stat-card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 16px; padding: 20px 24px;
    display: flex; align-items: center; gap: 16px;
  }

  .stat-icon {
    width: 44px; height: 44px; border-radius: 12px;
    display: flex; align-items: center; justify-content: center;
    font-size: 20px;
  }

  .stat-info p { font-size: 24px; font-weight: 700; font-family: 'Syne', sans-serif; }
  .stat-info span { font-size: 12px; color: var(--text2); }

  /* ADD TASK */
  .add-task-section {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 20px; padding: 28px; margin-bottom: 32px;
  }

  .section-title {
    font-family: 'Syne', sans-serif; font-size: 18px; font-weight: 700;
    margin-bottom: 20px; display: flex; align-items: center; gap: 10px;
  }

  .section-title::before {
    content: ''; width: 4px; height: 20px;
    background: linear-gradient(var(--accent), var(--accent2));
    border-radius: 2px; display: block;
  }

  .add-task-form { display: flex; flex-wrap: wrap; gap: 12px; }

  .task-input {
    flex: 1; min-width: 200px; padding: 12px 16px;
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: 10px; color: var(--text);
    font-family: 'DM Sans', sans-serif; font-size: 14px; outline: none;
    transition: border-color 0.2s;
  }

  .task-input:focus { border-color: var(--accent); }

  .task-select {
    padding: 12px 16px; background: var(--surface2);
    border: 1px solid var(--border); border-radius: 10px;
    color: var(--text); font-family: 'DM Sans', sans-serif;
    font-size: 14px; outline: none; cursor: pointer;
  }

  .btn-add {
    padding: 12px 24px;
    background: linear-gradient(135deg, var(--accent), #9c94ff);
    border: none; border-radius: 10px; color: white;
    font-family: 'Syne', sans-serif; font-size: 14px; font-weight: 600;
    cursor: pointer; transition: opacity 0.2s, transform 0.1s; white-space: nowrap;
  }

  .btn-add:hover { opacity: 0.9; transform: translateY(-1px); }

  /* FILTERS */
  .filters {
    display: flex; gap: 8px; margin-bottom: 24px; flex-wrap: wrap;
  }

  .filter-btn {
    padding: 8px 18px; border-radius: 20px;
    border: 1px solid var(--border); background: transparent;
    color: var(--text2); font-size: 13px; cursor: pointer;
    font-family: 'DM Sans', sans-serif; transition: all 0.2s;
  }

  .filter-btn.active {
    background: var(--accent); border-color: var(--accent);
    color: white;
  }

  /* TASKS */
  .tasks-section {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 20px; padding: 28px;
  }

  .tasks-list { display: flex; flex-direction: column; gap: 10px; margin-top: 20px; }

  .task-item {
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: 14px; padding: 16px 20px;
    display: flex; align-items: center; gap: 14px;
    transition: all 0.2s; animation: slideIn 0.3s ease;
  }

  @keyframes slideIn {
    from { opacity: 0; transform: translateY(-10px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .task-item:hover { border-color: var(--accent); transform: translateX(4px); }

  .task-check {
    width: 22px; height: 22px; border-radius: 6px;
    border: 2px solid var(--border); cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0; transition: all 0.2s;
  }

  .task-check.checked {
    background: var(--accent3); border-color: var(--accent3);
  }

  .task-check.checked::after { content: '✓'; color: #0a0a0f; font-size: 13px; font-weight: bold; }

  .task-content { flex: 1; }

  .task-title {
    font-size: 15px; font-weight: 500; margin-bottom: 4px;
    transition: all 0.2s;
  }

  .task-title.done { text-decoration: line-through; color: var(--text2); }

  .task-meta { display: flex; gap: 8px; align-items: center; }

  .task-priority {
    font-size: 11px; padding: 2px 8px; border-radius: 4px; font-weight: 500;
  }

  .priority-high { background: rgba(255,101,132,0.2); color: var(--accent2); }
  .priority-medium { background: rgba(255,193,7,0.2); color: #ffc107; }
  .priority-low { background: rgba(67,233,123,0.2); color: var(--accent3); }

  .task-date { font-size: 11px; color: var(--text2); }

  .task-actions { display: flex; gap: 6px; }

  .btn-edit, .btn-delete {
    width: 32px; height: 32px; border-radius: 8px;
    border: 1px solid var(--border); background: transparent;
    cursor: pointer; display: flex; align-items: center;
    justify-content: center; font-size: 14px; transition: all 0.2s;
  }

  .btn-edit:hover { border-color: var(--accent); background: rgba(108,99,255,0.1); }
  .btn-delete:hover { border-color: var(--accent2); background: rgba(255,101,132,0.1); }

  .empty-state {
    text-align: center; padding: 48px 20px; color: var(--text2);
  }

  .empty-state .empty-icon { font-size: 48px; margin-bottom: 12px; }
  .empty-state p { font-size: 15px; }

  /* EDIT MODAL */
  .modal-overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,0.7);
    display: none; align-items: center; justify-content: center;
    z-index: 1000; backdrop-filter: blur(4px);
  }

  .modal-overlay.show { display: flex; }

  .modal {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 20px; padding: 32px; width: 100%;
    max-width: 440px; margin: 20px;
    animation: modalIn 0.3s ease;
  }

  @keyframes modalIn {
    from { opacity: 0; transform: scale(0.9); }
    to { opacity: 1; transform: scale(1); }
  }

  .modal-title {
    font-family: 'Syne', sans-serif; font-size: 20px; font-weight: 700;
    margin-bottom: 24px;
  }

  .modal-actions { display: flex; gap: 10px; margin-top: 20px; }

  .btn-cancel {
    flex: 1; padding: 12px; background: transparent;
    border: 1px solid var(--border); border-radius: 10px;
    color: var(--text2); cursor: pointer; font-family: 'DM Sans', sans-serif;
    transition: all 0.2s;
  }

  .btn-cancel:hover { border-color: var(--text2); color: var(--text); }

  .btn-save {
    flex: 1; padding: 12px;
    background: linear-gradient(135deg, var(--accent), #9c94ff);
    border: none; border-radius: 10px; color: white;
    font-family: 'Syne', sans-serif; font-weight: 600; cursor: pointer;
  }

  @media (max-width: 600px) {
    .app-header { padding: 12px 16px; }
    .app-main { padding: 24px 16px; }
    .add-task-section, .tasks-section { padding: 20px 16px; }
    .auth-box { padding: 32px 24px; }
  }
</style>
</head>
<body>

<!-- AUTH SCREEN -->
<div id="auth-screen">
  <div class="auth-box">
    <div class="auth-logo">TaskFlow</div>
    <p class="auth-subtitle">Manage your tasks efficiently</p>

    <div class="auth-tabs">
      <button class="auth-tab active" onclick="switchTab('login')">Login</button>
      <button class="auth-tab" onclick="switchTab('signup')">Sign Up</button>
    </div>

    <div id="login-form">
      <div class="form-group">
        <label>Email</label>
        <input type="email" id="login-email" placeholder="you@example.com">
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="login-pass" placeholder="••••••••">
      </div>
      <button class="btn-primary" onclick="login()">Login →</button>
    </div>

    <div id="signup-form" style="display:none">
      <div class="form-group">
        <label>Name</label>
        <input type="text" id="signup-name" placeholder="Your Name">
      </div>
      <div class="form-group">
        <label>Email</label>
        <input type="email" id="signup-email" placeholder="you@example.com">
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="signup-pass" placeholder="Min 6 characters">
      </div>
      <button class="btn-primary" onclick="signup()">Create Account →</button>
    </div>

    <p class="auth-error" id="auth-error"></p>
  </div>
</div>

<!-- APP SCREEN -->
<div id="app-screen">
  <header class="app-header">
    <div class="app-logo">TaskFlow</div>
    <div class="header-right">
      <div class="user-badge">👤 <span id="user-name-display"></span></div>
      <button class="btn-logout" onclick="logout()">Logout</button>
    </div>
  </header>

  <main class="app-main">
    <!-- Stats -->
    <div class="stats-grid">
      <div class="stat-card">
        <div class="stat-icon" style="background:rgba(108,99,255,0.15)">📋</div>
        <div class="stat-info">
          <p id="stat-total">0</p>
          <span>Total Tasks</span>
        </div>
      </div>
      <div class="stat-card">
        <div class="stat-icon" style="background:rgba(255,193,7,0.15)">⏳</div>
        <div class="stat-info">
          <p id="stat-pending">0</p>
          <span>Pending</span>
        </div>
      </div>
      <div class="stat-card">
        <div class="stat-icon" style="background:rgba(67,233,123,0.15)">✅</div>
        <div class="stat-info">
          <p id="stat-done">0</p>
          <span>Completed</span>
        </div>
      </div>
      <div class="stat-card">
        <div class="stat-icon" style="background:rgba(255,101,132,0.15)">🔥</div>
        <div class="stat-info">
          <p id="stat-high">0</p>
          <span>High Priority</span>
        </div>
      </div>
    </div>

    <!-- Add Task -->
    <div class="add-task-section">
      <div class="section-title">Add New Task</div>
      <div class="add-task-form">
        <input class="task-input" id="task-title-input" placeholder="Task title..." style="flex:2">
        <input class="task-input" id="task-desc-input" placeholder="Description (optional)...">
        <select class="task-select" id="task-priority">
          <option value="low">🟢 Low</option>
          <option value="medium" selected>🟡 Medium</option>
          <option value="high">🔴 High</option>
        </select>
        <button class="btn-add" onclick="addTask()">+ Add Task</button>
      </div>
    </div>

    <!-- Filters -->
    <div class="filters">
      <button class="filter-btn active" onclick="setFilter('all', this)">All</button>
      <button class="filter-btn" onclick="setFilter('pending', this)">Pending</button>
      <button class="filter-btn" onclick="setFilter('completed', this)">Completed</button>
      <button class="filter-btn" onclick="setFilter('high', this)">🔴 High Priority</button>
    </div>

    <!-- Tasks List -->
    <div class="tasks-section">
      <div class="section-title">Your Tasks</div>
      <div class="tasks-list" id="tasks-list"></div>
    </div>
  </main>
</div>

<!-- Edit Modal -->
<div class="modal-overlay" id="edit-modal">
  <div class="modal">
    <div class="modal-title">Edit Task</div>
    <div class="form-group">
      <label>Title</label>
      <input class="task-input" id="edit-title" style="width:100%">
    </div>
    <div class="form-group">
      <label>Description</label>
      <input class="task-input" id="edit-desc" style="width:100%">
    </div>
    <div class="form-group">
      <label>Priority</label>
      <select class="task-select" id="edit-priority" style="width:100%">
        <option value="low">🟢 Low</option>
        <option value="medium">🟡 Medium</option>
        <option value="high">🔴 High</option>
      </select>
    </div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModal()">Cancel</button>
      <button class="btn-save" onclick="saveEdit()">Save Changes</button>
    </div>
  </div>
</div>

<script>
  // ===== DATA =====
  let users = JSON.parse(localStorage.getItem('tf_users') || '{}');
  let currentUser = null;
  let tasks = [];
  let currentFilter = 'all';
  let editingId = null;

  // ===== AUTH =====
  function switchTab(tab) {
    document.querySelectorAll('.auth-tab').forEach((t,i) => {
      t.classList.toggle('active', (tab==='login'&&i===0)||(tab==='signup'&&i===1));
    });
    document.getElementById('login-form').style.display = tab==='login' ? 'block' : 'none';
    document.getElementById('signup-form').style.display = tab==='signup' ? 'block' : 'none';
    document.getElementById('auth-error').style.display = 'none';
  }

  function showError(msg) {
    const el = document.getElementById('auth-error');
    el.textContent = msg; el.style.display = 'block';
  }

  function signup() {
    const name = document.getElementById('signup-name').value.trim();
    const email = document.getElementById('signup-email').value.trim();
    const pass = document.getElementById('signup-pass').value;
    if (!name || !email || !pass) return showError('Please fill all fields!');
    if (pass.length < 6) return showError('Password must be at least 6 characters!');
    if (users[email]) return showError('Email already registered!');
    users[email] = { name, email, pass, tasks: [] };
    localStorage.setItem('tf_users', JSON.stringify(users));
    showError(''); loginUser(email);
  }

  function login() {
    const email = document.getElementById('login-email').value.trim();
    const pass = document.getElementById('login-pass').value;
    if (!email || !pass) return showError('Please fill all fields!');
    if (!users[email] || users[email].pass !== pass) return showError('Invalid email or password!');
    loginUser(email);
  }

  function loginUser(email) {
    currentUser = users[email];
    tasks = currentUser.tasks || [];
    document.getElementById('user-name-display').textContent = currentUser.name;
    document.getElementById('auth-screen').style.display = 'none';
    document.getElementById('app-screen').style.display = 'block';
    renderTasks(); updateStats();
  }

  function logout() {
    saveTasks();
    currentUser = null; tasks = [];
    document.getElementById('auth-screen').style.display = 'flex';
    document.getElementById('app-screen').style.display = 'none';
  }

  // ===== TASKS =====
  function saveTasks() {
    if (!currentUser) return;
    users[currentUser.email].tasks = tasks;
    localStorage.setItem('tf_users', JSON.stringify(users));
  }

  function addTask() {
    const title = document.getElementById('task-title-input').value.trim();
    if (!title) return;
    const task = {
      id: Date.now(),
      title,
      desc: document.getElementById('task-desc-input').value.trim(),
      priority: document.getElementById('task-priority').value,
      done: false,
      date: new Date().toLocaleDateString('en-IN', {day:'2-digit',month:'short',year:'numeric'})
    };
    tasks.unshift(task);
    document.getElementById('task-title-input').value = '';
    document.getElementById('task-desc-input').value = '';
    saveTasks(); renderTasks(); updateStats();
  }

  function toggleTask(id) {
    const t = tasks.find(t => t.id === id);
    if (t) { t.done = !t.done; saveTasks(); renderTasks(); updateStats(); }
  }

  function deleteTask(id) {
    tasks = tasks.filter(t => t.id !== id);
    saveTasks(); renderTasks(); updateStats();
  }

  function editTask(id) {
    const t = tasks.find(t => t.id === id);
    if (!t) return;
    editingId = id;
    document.getElementById('edit-title').value = t.title;
    document.getElementById('edit-desc').value = t.desc || '';
    document.getElementById('edit-priority').value = t.priority;
    document.getElementById('edit-modal').classList.add('show');
  }

  function saveEdit() {
    const t = tasks.find(t => t.id === editingId);
    if (t) {
      t.title = document.getElementById('edit-title').value.trim() || t.title;
      t.desc = document.getElementById('edit-desc').value.trim();
      t.priority = document.getElementById('edit-priority').value;
    }
    closeModal(); saveTasks(); renderTasks();
  }

  function closeModal() {
    document.getElementById('edit-modal').classList.remove('show');
    editingId = null;
  }

  function setFilter(f, btn) {
    currentFilter = f;
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    renderTasks();
  }

  function getFiltered() {
    if (currentFilter === 'all') return tasks;
    if (currentFilter === 'pending') return tasks.filter(t => !t.done);
    if (currentFilter === 'completed') return tasks.filter(t => t.done);
    if (currentFilter === 'high') return tasks.filter(t => t.priority === 'high');
    return tasks;
  }

  function updateStats() {
    document.getElementById('stat-total').textContent = tasks.length;
    document.getElementById('stat-pending').textContent = tasks.filter(t => !t.done).length;
    document.getElementById('stat-done').textContent = tasks.filter(t => t.done).length;
    document.getElementById('stat-high').textContent = tasks.filter(t => t.priority === 'high').length;
  }

  function renderTasks() {
    const list = document.getElementById('tasks-list');
    const filtered = getFiltered();
    if (!filtered.length) {
      list.innerHTML = `<div class="empty-state"><div class="empty-icon">📭</div><p>No tasks found!</p></div>`;
      return;
    }
    list.innerHTML = filtered.map(t => `
      <div class="task-item">
        <div class="task-check ${t.done ? 'checked' : ''}" onclick="toggleTask(${t.id})"></div>
        <div class="task-content">
          <div class="task-title ${t.done ? 'done' : ''}">${t.title}</div>
          <div class="task-meta">
            <span class="task-priority priority-${t.priority}">${t.priority.toUpperCase()}</span>
            ${t.desc ? `<span class="task-date">${t.desc}</span>` : ''}
            <span class="task-date">📅 ${t.date}</span>
          </div>
        </div>
        <div class="task-actions">
          <button class="btn-edit" onclick="editTask(${t.id})" title="Edit">✏️</button>
          <button class="btn-delete" onclick="deleteTask(${t.id})" title="Delete">🗑️</button>
        </div>
      </div>
    `).join('');
  }

  // Enter key support
  document.addEventListener('keydown', e => {
    if (e.key === 'Enter' && document.getElementById('task-title-input') === document.activeElement) addTask();
  });
</script>
</body>
</html>
